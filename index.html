<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>День Победы — 9 Мая</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–gold: #D4A843;
–gold-light: #F2D07A;
–gold-pale: #FBF0C8;
–red: #B52A2A;
–red-dark: #7A1010;
–cream: #FDF6E3;
–dark: #1A0A00;
–star-color: #D4A843;
}

html, body {
width: 100%; height: 100%;
background: #111;
display: flex; align-items: center; justify-content: center;
font-family: ‘Cormorant Garamond’, serif;
}

.card {
position: relative;
width: 520px;
min-height: 720px;
background: linear-gradient(160deg, #1c0a00 0%, #2e0d00 40%, #1a0500 100%);
border: 2px solid var(–gold);
overflow: hidden;
box-shadow: 0 0 80px rgba(212,168,67,0.25), 0 0 0 6px rgba(212,168,67,0.08);
}

/* Corner ornaments */
.corner {
position: absolute;
width: 60px; height: 60px;
border-color: var(–gold);
border-style: solid;
opacity: 0.7;
}
.corner–tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
.corner–tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
.corner–bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
.corner–br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

/* Fireworks canvas */
canvas {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
}

/* Ribbon banner */
.ribbon {
position: absolute;
top: 0; left: 0; right: 0;
height: 22px;
background: repeating-linear-gradient(
90deg,
var(–red-dark) 0px,
var(–red-dark) 20px,
#f5c300 20px,
#f5c300 40px,
#1a0500 40px,
#1a0500 60px
);
opacity: 0.85;
animation: ribbonShift 6s linear infinite;
}
@keyframes ribbonShift {
from { background-position: 0 0; }
to { background-position: 60px 0; }
}
.ribbon-bottom {
bottom: 0; top: auto;
}

/* Star of Victory */
.star-wrap {
position: relative;
z-index: 10;
display: flex;
justify-content: center;
padding-top: 40px;
animation: floatStar 4s ease-in-out infinite;
}
@keyframes floatStar {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-6px); }
}

.star-svg {
filter: drop-shadow(0 0 18px rgba(212,168,67,0.9)) drop-shadow(0 0 40px rgba(212,168,67,0.4));
animation: glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse {
0%, 100% { filter: drop-shadow(0 0 14px rgba(212,168,67,0.8)) drop-shadow(0 0 35px rgba(212,168,67,0.3)); }
50% { filter: drop-shadow(0 0 28px rgba(212,168,67,1)) drop-shadow(0 0 60px rgba(212,168,67,0.6)); }
}

/* Main text block */
.content {
position: relative;
z-index: 10;
text-align: center;
padding: 14px 40px 0;
}

.date-label {
font-family: ‘Cormorant Garamond’, serif;
font-size: 13px;
letter-spacing: 8px;
text-transform: uppercase;
color: var(–gold-light);
opacity: 0.75;
margin-bottom: 10px;
}

.headline {
font-family: ‘Playfair Display’, serif;
font-weight: 900;
font-size: 62px;
line-height: 1;
color: var(–gold);
text-shadow: 0 0 40px rgba(212,168,67,0.6), 2px 2px 0 var(–red-dark);
animation: textGlow 3s ease-in-out infinite;
margin-bottom: 4px;
}
@keyframes textGlow {
0%, 100% { text-shadow: 0 0 30px rgba(212,168,67,0.5), 2px 2px 0 var(–red-dark); }
50% { text-shadow: 0 0 55px rgba(242,208,122,0.9), 2px 2px 0 var(–red-dark); }
}

.sub-headline {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: 26px;
color: var(–gold-light);
opacity: 0.9;
letter-spacing: 2px;
margin-bottom: 16px;
}

/* Horizontal rule */
.divider {
display: flex;
align-items: center;
gap: 10px;
justify-content: center;
margin: 6px 0 16px;
}
.divider-line {
flex: 1;
height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
max-width: 100px;
}
.divider-diamond {
width: 8px; height: 8px;
background: var(–gold);
transform: rotate(45deg);
flex-shrink: 0;
}

/* Body text */
.body-text {
font-size: 17px;
line-height: 1.75;
color: var(–gold-pale);
opacity: 0.88;
max-width: 380px;
margin: 0 auto 20px;
}

/* Year badge */
.year-badge {
display: inline-block;
font-family: ‘Playfair Display’, serif;
font-weight: 700;
font-size: 15px;
letter-spacing: 4px;
color: var(–dark);
background: linear-gradient(135deg, var(–gold-light), var(–gold));
padding: 6px 24px;
margin-bottom: 22px;
clip-path: polygon(10px 0%, calc(100% - 10px) 0%, 100% 50%, calc(100% - 10px) 100%, 10px 100%, 0% 50%);
}

/* Laurel wreath row */
.wreath-row {
display: flex;
justify-content: center;
gap: 12px;
margin-bottom: 14px;
font-size: 26px;
opacity: 0.85;
}

/* Bottom inscription */
.bottom-text {
font-family: ‘Cormorant Garamond’, serif;
font-style: italic;
font-size: 14px;
color: var(–gold);
opacity: 0.6;
letter-spacing: 3px;
text-align: center;
padding-bottom: 32px;
position: relative;
z-index: 10;
}

/* Fade-in animation for card */
.card { animation: fadeIn 1.2s ease; }
@keyframes fadeIn {
from { opacity: 0; transform: scale(0.96); }
to { opacity: 1; transform: scale(1); }
}

/* Small stars scattered */
.sparkles {
position: absolute;
top: 0; left: 0; width: 100%; height: 100%;
pointer-events: none;
z-index: 5;
}
.sp {
position: absolute;
width: 3px; height: 3px;
border-radius: 50%;
background: var(–gold-light);
animation: twinkle var(–dur, 2.5s) var(–del, 0s) ease-in-out infinite;
}
@keyframes twinkle {
0%, 100% { opacity: 0; transform: scale(0.5); }
50% { opacity: 1; transform: scale(1.5); }
}
</style>

</head>
<body>

</div>

<div class="content">
<div class="date-label">9 мая 1945 — 2026</div>

<script>
// Scattered sparkle dots
const sp = document.getElementById('sparkles');
for (let i = 0; i < 28; i++) {
const d = document.createElement('div');
d.className = 'sp';
d.style.left = Math.random() * 100 + '%';
d.style.top = Math.random() * 100 + '%';
d.style.setProperty('--dur', (1.5 + Math.random() * 3) + 's');
d.style.setProperty('--del', (Math.random() * 3) + 's');
d.style.width = d.style.height = (2 + Math.random() * 3) + 'px';
sp.appendChild(d);
}

// Fireworks
const canvas = document.getElementById('fw');
const ctx = canvas.getContext('2d');

function resize() {
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;
}
resize();

const particles = [];
const COLORS = ['#D4A843','#F2D07A','#FBF0C8','#e85c5c','#ffffff','#FFD700'];

function launch() {
const x = 60 + Math.random() * (canvas.width - 120);
const y = 40 + Math.random() * (canvas.height * 0.5);
const color = COLORS[Math.floor(Math.random() * COLORS.length)];
for (let i = 0; i < 48; i++) {
const angle = (Math.PI * 2 / 48) * i;
const speed = 1.5 + Math.random() * 2.5;
particles.push({
x, y,
vx: Math.cos(angle) * speed,
vy: Math.sin(angle) * speed,
alpha: 1,
color,
r: 1.5 + Math.random() * 1.5,
tail: []
});
}
}

function animate() {
ctx.clearRect(0, 0, canvas.width, canvas.height);
for (let i = particles.length - 1; i >= 0; i--) {
const p = particles[i];
p.tail.unshift({ x: p.x, y: p.y });
if (p.tail.length > 5) p.tail.pop();
p.x += p.vx;
p.y += p.vy;
p.vy += 0.045;
p.alpha -= 0.018;
if (p.alpha <= 0) { particles.splice(i, 1); continue; }
// tail
for (let t = 0; t < p.tail.length; t++) {
ctx.beginPath();
ctx.arc(p.tail[t].x, p.tail[t].y, p.r * (1 - t / p.tail.length), 0, Math.PI * 2);
ctx.fillStyle = p.color;
ctx.globalAlpha = p.alpha * (1 - t / p.tail.length) * 0.4;
ctx.fill();
}
// head
ctx.beginPath();
ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
ctx.fillStyle = p.color;
ctx.globalAlpha = p.alpha;
ctx.fill();
}
ctx.globalAlpha = 1;
requestAnimationFrame(animate);
}

animate();
launch();
setInterval(launch, 1400);
</script>

</body>
</html>
